# TODO: Build your image and push it to Docker Hub automatically on every merge to master.
# Use the repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN — do NOT hard-code them.
name: Build and Push to Docker Hub

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # TODO: check out the code
      - name: Checkout source code
        uses: actions/checkout@v4

      # TODO: log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # TODO: build from your Dockerfile and push the image,
      #       tagged with the app version (e.g. 0.2) AND the commit SHA
       - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clo835-assignment2:0.2
            ${{ secrets.DOCKERHUB_USERNAME }}/clo835-assignment2:${{ github.sha }}
