# TODO: Build your image and push it to Docker Hub automatically on every merge to master.
# Use the repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN — do NOT hard-code them.
name: Build and Push to Docker Hub

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/clo835-assignment2:0.3
            ${{ secrets.DOCKERHUB_USERNAME }}/clo835-assignment2:${{ github.sha }}
